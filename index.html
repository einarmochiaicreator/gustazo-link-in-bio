<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
    <meta name="format-detection" content="telephone=no">
    <title>Gustazo — Panadería y Repostería Sin Gluten</title>
    <meta name="description"
        content="Panadería y repostería sin gluten para disfrutar con tranquilidad. Tienda online, puntos de venta y más.">
    <meta property="og:title" content="Gustazo — Panadería y Repostería Sin Gluten">
    <meta property="og:description" content="Panadería y repostería sin gluten para disfrutar con tranquilidad.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #B8860B;
            --gold-light: #D4A017;
            --gold-glow: rgba(184, 134, 11, 0.35);
            --dark: #2C1A05;
            --dark-soft: #3D2B14;
            --white: #FFFFFF;
            --white-90: rgba(255, 255, 255, 0.92);
            --white-70: rgba(255, 255, 255, 0.70);
            --white-50: rgba(255, 255, 255, 0.50);
            --white-20: rgba(255, 255, 255, 0.20);
            --white-10: rgba(255, 255, 255, 0.10);
            --glass-bg: rgba(255, 255, 255, 0.18);
            --glass-border: rgba(255, 255, 255, 0.35);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            --wa-green: #25D366;
            --disabled-bg: rgba(255, 255, 255, 0.10);
            --disabled-border: rgba(255, 255, 255, 0.15);
            --disabled-text: rgba(255, 255, 255, 0.45);
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: var(--white);
            position: relative;
            overflow-x: hidden;
        }

        /* ===== BACKGROUND ===== */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('bg-bakery.png') center center / cover no-repeat;
            filter: blur(8px) brightness(0.45) saturate(1.1);
            transform: scale(1.05);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(180deg,
                    rgba(44, 26, 5, 0.55) 0%,
                    rgba(44, 26, 5, 0.40) 40%,
                    rgba(44, 26, 5, 0.65) 100%);
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 36px 20px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== LOGO ===== */
        .logo-header {
            position: relative;
            display: inline-flex;
            margin-bottom: 25px;
        }

        .logo-main {
            width: 250px;
            height: auto;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.3));
        }

        .logo-badge {
            position: absolute;
            top: 0;
            right: -15px;
            width: 75px;
            /* S ligeramente más grande para que se note el detalle */
            height: auto;
            transform: translate(0, -20%);
            /* "Elevado" como un exponente */
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
            z-index: 2;
        }

        .logo-fallback {
            width: 110px;
            height: 110px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: var(--white);
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.3));
        }

        .brand-name {
            font-size: 1.1rem;
            /* Slightly smaller than original 1.2 to keep it elegant */
            font-weight: 500;
            line-height: 1.4;
            letter-spacing: 0.01em;
            color: var(--white);
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            margin-bottom: 50px;
            /* Increased separation from buttons */
            text-align: center;
            max-width: 300px;
        }

        /* ===== GLASS BUTTONS ===== */
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            margin-bottom: 40px;
        }

        .glass-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 16px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--white);
            text-decoration: none;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                var(--glass-shadow),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, transparent 100%);
            border-radius: 16px 16px 0 0;
            pointer-events: none;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.26);
            border-color: rgba(255, 255, 255, 0.50);
            transform: translateY(-2px);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .glass-btn:active {
            transform: translateY(0px) scale(0.98);
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .glass-btn .icon {
            width: 38px;
            height: 38px;
            min-width: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.15rem;
            background: rgba(255, 255, 255, 0.12);
        }

        .glass-btn .label {
            flex: 1;
        }

        .glass-btn .arrow {
            font-size: 1.1rem;
            opacity: 0.5;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .glass-btn:hover .arrow {
            transform: translateX(3px);
            opacity: 0.8;
        }

        /* --- Gold accent button --- */
        .glass-btn--gold {
            background: linear-gradient(135deg, rgba(184, 134, 11, 0.35), rgba(212, 160, 23, 0.25));
            border-color: rgba(212, 160, 23, 0.45);
        }

        .glass-btn--gold:hover {
            background: linear-gradient(135deg, rgba(184, 134, 11, 0.50), rgba(212, 160, 23, 0.35));
            border-color: rgba(212, 160, 23, 0.65);
        }

        .glass-btn--gold .icon {
            background: rgba(212, 160, 23, 0.30);
        }

        /* --- WhatsApp button --- */
        .glass-btn--wa {
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.22), rgba(37, 211, 102, 0.14));
            border-color: rgba(37, 211, 102, 0.35);
        }

        .glass-btn--wa:hover {
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.35), rgba(37, 211, 102, 0.22));
            border-color: rgba(37, 211, 102, 0.55);
        }

        .glass-btn--wa .icon {
            background: rgba(37, 211, 102, 0.25);
        }

        /* --- Rappi button --- */
        .glass-btn--rappi {
            background: linear-gradient(135deg, rgba(255, 68, 31, 0.28), rgba(255, 68, 31, 0.16));
            border-color: rgba(255, 68, 31, 0.40);
        }

        .glass-btn--rappi:hover {
            background: linear-gradient(135deg, rgba(255, 68, 31, 0.42), rgba(255, 68, 31, 0.28));
            border-color: rgba(255, 68, 31, 0.60);
        }

        .glass-btn--rappi .icon {
            background: rgba(255, 68, 31, 0.28);
        }

        /* --- PedidosYa button --- */
        .glass-btn--peya {
            background: linear-gradient(135deg, rgba(216, 30, 91, 0.28), rgba(216, 30, 91, 0.16));
            border-color: rgba(216, 30, 91, 0.40);
        }

        .glass-btn--peya:hover {
            background: linear-gradient(135deg, rgba(216, 30, 91, 0.42), rgba(216, 30, 91, 0.28));
            border-color: rgba(216, 30, 91, 0.60);
        }

        .glass-btn--peya .icon {
            background: rgba(216, 30, 91, 0.28);
        }

        /* --- Disabled / Próximamente --- */
        .glass-btn--disabled {
            background: var(--disabled-bg);
            border-color: var(--disabled-border);
            color: var(--disabled-text);
            cursor: default;
            pointer-events: none;
        }

        .glass-btn--disabled::before {
            display: none;
        }

        .glass-btn--disabled .icon {
            background: rgba(255, 255, 255, 0.06);
            opacity: 0.5;
        }

        .glass-btn--disabled .arrow {
            display: none;
        }

        .badge-soon {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: rgba(255, 255, 255, 0.10);
            color: var(--disabled-text);
            padding: 3px 8px;
            border-radius: 6px;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding-top: 8px;
        }

        .footer p {
            font-size: 0.72rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--white-50);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrap {
            animation: fadeIn 0.5s ease both;
        }

        .brand-name {
            animation: fadeIn 0.5s ease 0.05s both;
        }

        .tagline {
            animation: fadeIn 0.5s ease 0.1s both;
        }

        .links .glass-btn:nth-child(1) {
            animation: fadeIn 0.4s ease 0.15s both;
        }

        .links .glass-btn:nth-child(2) {
            animation: fadeIn 0.4s ease 0.20s both;
        }

        .links .glass-btn:nth-child(3) {
            animation: fadeIn 0.4s ease 0.25s both;
        }

        .links .glass-btn:nth-child(4) {
            animation: fadeIn 0.4s ease 0.30s both;
        }

        .links .glass-btn:nth-child(5) {
            animation: fadeIn 0.4s ease 0.35s both;
        }

        .links .glass-btn:nth-child(6) {
            animation: fadeIn 0.4s ease 0.40s both;
        }

        .footer {
            animation: fadeIn 0.5s ease 0.5s both;
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 520px) {
            .container {
                padding: 48px 28px 64px;
            }

            .brand-name {
                font-size: 1.3rem;
            }

            .glass-btn {
                padding: 18px 22px;
                font-size: 1rem;
                border-radius: 18px;
            }
        }

        /* ===== FOCUS ===== */
        .glass-btn:focus-visible {
            outline: 2px solid var(--gold-light);
            outline-offset: 2px;
        }

        /* ===== REDUCED MOTION ===== */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <!-- Blurred background -->

    <div class="bg-overlay" aria-hidden="true"></div>

    <main class="container">

            <a href="https://www.rappi.com.ar/restaurantes/252280-gustazo" class="glass-btn glass-btn--rappi"

        <!-- FOOTER -->
        <footer class="footer">

    </main>

</body>

</html>
